<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

.page {
  display:none;
  height:100vh;
  width:100%;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  position:relative;
}

.active { display:flex; }

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* 🌌 Background */
.stars::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: repeating-linear-gradient(
    45deg,
    white 0px,
    white 2px,
    transparent 2px,
    transparent 12px
  );
  opacity:0.05;
}

/* ✍️ Typing Effect */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  display:inline-block;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* 🎉 Confetti */
.confetti {
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
}
.confetti div {
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  animation: fall 3s linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active stars" id="p1">
  <h2 id="text1" class="typing"></h2>
  <p id="text2"></p>
  <button onclick="nextPage(2)">Next</button>
</div>

<!-- PAGE 2 -->
<div class="page stars" id="p2">
  <h3 id="text3"></h3>
  <p>Kaisa laga mere saath rehkr?</p>
  <button onclick="wrong()">Accha</button>
  <button onclick="wrong()">Bohot bekar</button>
  <button onclick="wrong()">Best</button>
  <button onclick="correct()">I can't express ❤️</button>
</div>

<!-- PAGE 3 -->
<div class="page stars" id="p3">
  <h3>Gift chahiye?? 🎁</h3>
  <button id="yes" onclick="tapYes()">YES</button>
  <button onclick="growYes()">NO</button>
</div>

<!-- PAGE 4 -->
<div class="page stars" id="p4">
  <div class="confetti" id="confetti"></div>
  <h2 id="text4"></h2>
  <p id="text5"></p>
  <button id="next4" style="display:none;" onclick="nextPage(5)">Next</button>
</div>

<!-- PAGE 5 -->
<div class="page stars" id="p5">
  <h2 id="text6"></h2>
</div>

<script>
function nextPage(num){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+num).classList.add('active');
}

/* ✍️ Typing function */
function typeText(element, text, speed=40){
  let i=0;
  function typing(){
    if(i<text.length){
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

/* PAGE TEXTS */
typeText(document.getElementById("text1"), "Hello it's your best friend Sameer 🎁");
setTimeout(()=>typeText(document.getElementById("text2"), "A small gift for u"),1500);

setTimeout(()=>typeText(document.getElementById("text3"), "Sorry bro birthday ke din kuch diya nahi 😅"),2000);

setTimeout(()=>{
  typeText(document.getElementById("text4"), "🎉 Happy Birthday Prince 🎉");
  typeText(document.getElementById("text5"),
`Mera bhai hai tu 🤭
Tere saath bohot maza aata hai
Tere parents khush rahe
Tu successful ho life me

Love life thodi kharab hai 😆 koi na
Believe in God plans 🙏

Hamesha khush rehna
Kuch hoga to batana
Main hu tere liye hamesha 💙

Sorry block ki dhamkiyon ke liye 😭`,10);
},4000);

setTimeout(()=>typeText(document.getElementById("text6"), "THANK YOU ❤️"),5000);

function correct(){
  nextPage(3);
}
function wrong(){
  alert("Sach bol 😏");
}

/* YES GAME */
let taps=0;
function tapYes(){
  taps++;
  document.getElementById('yes').style.transform=`scale(${1+taps})`;
  if(taps>=7) nextPage(4);
}
function growYes(){
  document.getElementById('yes').style.transform="scale(2)";
}

/* Delay next button */
setTimeout(()=>{
  document.getElementById('next4').style.display='block';
},10000);

/* CONFETTI */
let conf=document.getElementById('confetti');
for(let i=0;i<50;i++){
  let d=document.createElement('div');
  d.style.left=Math.random()*100+"%";
  d.style.animationDuration=(Math.random()*3+2)+"s";
  conf.appendChild(d);
}
</script>

</body>
  </html>
